name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with ruff
      run: |
        ruff check src/ tests/

    - name: Format check with ruff
      run: |
        ruff format --check src/ tests/

    - name: Set up ephemeral GPG key for tests
      run: |
        export GNUPGHOME="$(mktemp -d)"
        gpg --batch --gen-key <<EOF
        Key-Type: RSA
        Key-Length: 2048
        Name-Real: PatchForge CI
        Name-Email: ci@patchforge.test
        %no-protection
        %commit
        EOF
        gpg --batch --list-secret-keys | grep -q sec || { echo "::error::GPG key generation did not produce a usable secret key"; exit 1; }
        echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

    - name: Run tests (parallel)
      run: |
        pytest -v --tb=short --cov=src/orchestrator --cov-report= --cov-append -n auto --dist loadfile -m "not serial"

    - name: Run tests (serial)
      run: |
        pytest -v --tb=short --cov=src/orchestrator --cov-report=xml --cov-append -m serial || [ $? -eq 5 ]

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true
