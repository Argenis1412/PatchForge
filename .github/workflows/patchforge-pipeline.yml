name: PatchForge Pipeline

on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
      issue-title:
        required: true
        type: string
      issue-body:
        required: true
        type: string
      risk-budget:
        required: false
        type: string
        default: "low"
      base-branch:
        required: false
        type: string
        default: "main"
      patchforge-image:
        required: false
        type: string
        default: "ghcr.io/argenis1412/patchforge:latest"
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      OPENROUTER_API_KEY:
        required: false

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      ISSUE_NUMBER: ${{ inputs.issue-number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          ref: ${{ inputs.base-branch }}

      - name: Configure runner git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Prepare workspace and issue file
        env:
          ISSUE_TITLE: ${{ inputs.issue-title }}
          ISSUE_BODY: ${{ inputs.issue-body }}
        run: |
          mkdir -p /tmp/pf-workspace
          python3 << 'PYEOF'
          import json, os
          title = os.environ["ISSUE_TITLE"]
          number = os.environ["ISSUE_NUMBER"]
          body = os.environ["ISSUE_BODY"]
          with open("/tmp/pf-workspace/issue.md", "w") as f:
              f.write("---\n")
              f.write(f"title: {json.dumps(title)}\n")
              f.write(f"number: {number}\n")
              f.write("---\n\n")
              f.write(body)
              f.write("\n")
          PYEOF

      - name: Run PatchForge pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PATCHFORGE_IMAGE: ${{ inputs.patchforge-image }}
          RISK_BUDGET: ${{ inputs.risk-budget }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            -v /tmp/pf-workspace:/workspace \
            -e ANTHROPIC_API_KEY \
            -e GOOGLE_API_KEY \
            -e OPENROUTER_API_KEY \
            -e GITHUB_ACTOR \
            "$PATCHFORGE_IMAGE" \
            patchforge ci /repo \
              --workspace /workspace \
              --issue-file /workspace/issue.md \
              --issue-number "$ISSUE_NUMBER" \
              --risk-budget "$RISK_BUDGET" \
              --result-file /workspace/ci_result.json

      - name: Parse CI result
        id: result
        if: always()
        run: |
          RESULT_FILE="/tmp/pf-workspace/ci_result.json"
          if [ ! -f "$RESULT_FILE" ]; then
            echo "status=unknown" >> "$GITHUB_OUTPUT"
            echo "::error::ci_result.json not found"
            exit 1
          fi
          cat "$RESULT_FILE"
          RUN_ID=$(python3 -c "import json; print(json.load(open('$RESULT_FILE'))['run_id'])")
          BRANCH=$(python3 -c "import json; print(json.load(open('$RESULT_FILE'))['branch'])")
          STATUS=$(python3 -c "import json; print(json.load(open('$RESULT_FILE'))['status'])")
          RISK=$(python3 -c "import json; print(json.load(open('$RESULT_FILE'))['risk_budget'])")
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "risk=$RISK" >> "$GITHUB_OUTPUT"

      - name: Push branch
        if: steps.result.outputs.status == 'applied'
        env:
          BRANCH: ${{ steps.result.outputs.branch }}
        run: git push -u origin "$BRANCH"

      - name: Create Pull Request
        if: steps.result.outputs.status == 'applied'
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: ${{ inputs.base-branch }}
          RUN_ID: ${{ steps.result.outputs.run_id }}
          BRANCH: ${{ steps.result.outputs.branch }}
          RISK: ${{ steps.result.outputs.risk }}
        run: |

          AFFECTED=""
          TRIGGERED_BY_LINE=""
          if [ -f "/tmp/pf-workspace/ci_result.json" ]; then
            AFFECTED=$(python3 -c "
          import json
          r = json.load(open('/tmp/pf-workspace/ci_result.json'))
          print('\n'.join(f'- \`{f}\`' for f in r.get('affected_files', [])))
          ")
            TRIGGERED_BY_LINE=$(python3 -c "
          import json
          r = json.load(open('/tmp/pf-workspace/ci_result.json'))
          triggered_by = r.get('triggered_by')
          print(f'**Triggered by:** {triggered_by}' if triggered_by else '')
          ")
          fi

          VALIDATION=""
          VAL_FILE="/tmp/pf-workspace/runs/$RUN_ID/validation.json"
          if [ -f "$VAL_FILE" ]; then
            VALIDATION=$(python3 -c "
          import json
          v = json.load(open('$VAL_FILE'))
          passed = v.get('overall_passed', False)
          print('Passed' if passed else 'Failed')
          ")
          fi

          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH" \
            --title "patchforge: issue #$ISSUE_NUMBER" \
            --body "Closes #$ISSUE_NUMBER

          ## PatchForge Automated PR

          **Run ID:** \`$RUN_ID\`
          **Source issue:** #$ISSUE_NUMBER
          **Risk budget:** $RISK
          **Validation:** $VALIDATION
          $TRIGGERED_BY_LINE

          ### Affected files
          $AFFECTED

          ---
          Review the artifacts in the workflow run for \`plan.json\`, \`patch.diff\`, and \`validation.json\`.

          *Generated by PatchForge CI pipeline*"

      - name: Comment and label success
        if: steps.result.outputs.status == 'applied'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.result.outputs.branch }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "PatchForge pipeline completed successfully. PR created from branch \`$BRANCH\`."
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "patchforge/process" --add-label "patchforge/completed"

      - name: Comment and label on failure
        if: always() && steps.result.outputs.status != 'applied'
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS: ${{ steps.result.outputs.status }}
        run: |
          ERROR=""
          if [ -f "/tmp/pf-workspace/ci_result.json" ]; then
            ERROR=$(python3 -c "
          import json
          r = json.load(open('/tmp/pf-workspace/ci_result.json'))
          print(r.get('error', 'Unknown error'))
          " 2>/dev/null || echo "Could not parse error")
          fi
          gh issue comment "$ISSUE_NUMBER" \
            --body "## PatchForge Pipeline Failed

          **Stage:** \`$STATUS\`
          **Error:** $ERROR

          See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "patchforge/process" --add-label "patchforge/failed"

      - name: Write step summary
        if: always()
        env:
          STATUS: ${{ steps.result.outputs.status }}
          RUN_ID: ${{ steps.result.outputs.run_id }}
          RISK: ${{ steps.result.outputs.risk }}
        run: |
          echo "## PatchForge Pipeline" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run ID | \`${RUN_ID:-unknown}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | \`${STATUS:-unknown}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Issue | #$ISSUE_NUMBER |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Risk | ${RISK:-unknown} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patchforge-run-${{ steps.result.outputs.run_id || 'unknown' }}
          path: /tmp/pf-workspace/runs/
          retention-days: 30
