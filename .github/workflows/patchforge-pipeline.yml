name: PatchForge Pipeline

on:
  issues:
    types: [labeled]

concurrency:
  group: patchforge-pipeline-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  pipeline:
    if: >-
      github.event.label.name == 'patchforge/process'
      && github.event.issue.pull_request == null
      && !github.event.repository.fork
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      PF_WORKSPACE: pf-workspace
      ISSUE_NUMBER: ${{ github.event.issue.number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PatchForge
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Prepare issue file
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python << 'PYEOF'
          import os
          title = os.environ["ISSUE_TITLE"]
          number = os.environ["ISSUE_NUMBER"]
          body = os.environ["ISSUE_BODY"]
          safe_title = title.replace('"', '\\"')
          with open("issue.md", "w") as f:
              f.write("---\n")
              f.write(f'title: "{safe_title}"\n')
              f.write(f"number: {number}\n")
              f.write("---\n\n")
              f.write(body)
              f.write("\n")
          PYEOF

      - name: Scan
        run: patchforge scan . --workspace "$PF_WORKSPACE" --risk-budget low

      - name: Extract and verify run_id
        id: run_id
        run: |
          RUN_ID=$(ls -1t "$PF_WORKSPACE/runs/" | head -1)
          if [ -z "$RUN_ID" ]; then
            echo "::error::No run directory found after scan"
            exit 1
          fi
          STATUS=$(python -c "import json, pathlib; print(json.loads(pathlib.Path('$PF_WORKSPACE/runs/$RUN_ID/run.json').read_text())['status'])")
          if [ "$STATUS" != "scanned" ]; then
            echo "::error::run.json status is '$STATUS', expected 'scanned'"
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Run ID: $RUN_ID"

      - name: Plan
        run: |
          patchforge plan "${{ steps.run_id.outputs.run_id }}" \
            --workspace "$PF_WORKSPACE" \
            --issue-file issue.md

      - name: Preview
        run: |
          patchforge preview "${{ steps.run_id.outputs.run_id }}" \
            --workspace "$PF_WORKSPACE"

      - name: Apply
        run: |
          patchforge apply "${{ steps.run_id.outputs.run_id }}" \
            --workspace "$PF_WORKSPACE" \
            --allow-dirty

      - name: Verify apply success
        run: |
          RUN_ID="${{ steps.run_id.outputs.run_id }}"
          SUCCESS=$(python -c "import json, pathlib; print(json.loads(pathlib.Path('$PF_WORKSPACE/runs/$RUN_ID/apply.json').read_text())['success'])")
          if [ "$SUCCESS" != "True" ]; then
            echo "::error::apply.json reports success=$SUCCESS"
            exit 1
          fi

      - name: Commit and push
        run: |
          RUN_ID="${{ steps.run_id.outputs.run_id }}"
          git config user.name "patchforge[bot]"
          git config user.email "patchforge@users.noreply.github.com"
          git checkout -b "patchforge/$RUN_ID"
          git add -A
          git commit -m "patchforge: apply $RUN_ID (issue #$ISSUE_NUMBER)"
          git push -u origin "patchforge/$RUN_ID"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ steps.run_id.outputs.run_id }}"
          gh pr create \
            --base main \
            --head "patchforge/$RUN_ID" \
            --title "patchforge: issue #$ISSUE_NUMBER" \
            --body "Closes #$ISSUE_NUMBER

          ## PatchForge Automated PR

          **Run ID:** \`$RUN_ID\`
          **Source issue:** #$ISSUE_NUMBER

          This PR was generated by the PatchForge pipeline (\`scan → plan → preview → apply\`).
          Review the artifacts in the workflow run for \`plan.json\`, \`patch.diff\`, and \`validation.json\`.

          ---
          *Generated by PatchForge CI pipeline*"

      - name: Label issue as completed
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "patchforge/process" --add-label "patchforge/completed"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patchforge-run-${{ steps.run_id.outputs.run_id || 'unknown' }}
          path: ${{ env.PF_WORKSPACE }}/runs/
          retention-days: 30

      - name: Comment and label on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "## PatchForge Pipeline Failed

          The pipeline failed during execution. See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

          Artifacts (if any) are uploaded to the workflow run."
          gh issue edit "$ISSUE_NUMBER" --remove-label "patchforge/process" --add-label "patchforge/failed"
